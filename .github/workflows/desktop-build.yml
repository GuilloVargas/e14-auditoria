name: Build desktop apps

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            artifact: audit-e14-macos
          - name: Windows
            os: windows-latest
            artifact: audit-e14-windows
          - name: Linux
            os: ubuntu-latest
            artifact: audit-e14-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check sources
        run: npm run check

      - name: Build desktop distributable
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload distributable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.yaml
            dist/*.blockmap
          if-no-files-found: error
          retention-days: 14
